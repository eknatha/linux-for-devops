# =============================================================================
# fstab-production.conf
# Production /etc/fstab — persistent filesystem mount configuration.
# Use UUIDs (not device names) — device names can change after reboots.
#
# INSTALLATION:
#   # 1. Get UUIDs of your devices
#   blkid
#   lsblk -f
#
#   # 2. Backup current fstab
#   sudo cp /etc/fstab /etc/fstab.bak-$(date +%F)
#
#   # 3. Edit fstab
#   sudo vi /etc/fstab
#
#   # 4. Test without rebooting
#   sudo mount -a
#   sudo mount -fav   # dry-run
#
# FORMAT: <device>  <mountpoint>  <type>  <options>  <dump>  <pass>
#   dump: 0=skip, 1=include in backup (legacy — rarely used)
#   pass: 0=no fsck, 1=fsck first (root), 2=fsck after root
#
# Author : Eknatha
# Repo   : linux-for-devops/04-disk-management
# =============================================================================

# ── Root filesystem ────────────────────────────────────────────────────────────
# errors=remount-ro: remount read-only on filesystem error (prevents corruption)
UUID="REPLACE-WITH-ROOT-UUID"    /           ext4    defaults,errors=remount-ro   0  1

# ── Boot partition ─────────────────────────────────────────────────────────────
UUID="REPLACE-WITH-BOOT-UUID"    /boot       ext4    defaults                     0  2

# ── EFI System Partition ───────────────────────────────────────────────────────
UUID="REPLACE-WITH-EFI-UUID"     /boot/efi   vfat    umask=0077                   0  1

# ── Application data — XFS, noatime for performance ────────────────────────────
# noatime: don't update file access timestamps on reads (reduces write ops by ~30%)
# nodiratime: same for directory entries
UUID="REPLACE-WITH-APP-UUID"     /opt/app    xfs     defaults,noatime,nodiratime  0  2

# ── Database storage — dedicated volume ────────────────────────────────────────
# noatime + barrier=0 for SSD-backed storage with battery-backed RAID controller
UUID="REPLACE-WITH-DB-UUID"      /var/lib/postgresql  xfs  defaults,noatime       0  2

# ── Log volume ─────────────────────────────────────────────────────────────────
UUID="REPLACE-WITH-LOG-UUID"     /var/log    ext4    defaults,noatime             0  2

# ── Backup / archive storage ───────────────────────────────────────────────────
UUID="REPLACE-WITH-BACKUP-UUID"  /backup     xfs     defaults,noatime             0  2

# ── LVM logical volumes (can use /dev/mapper path — stable name) ───────────────
/dev/mapper/vg_data-lv_app       /opt/app    xfs     defaults,noatime             0  2
/dev/mapper/vg_data-lv_logs      /var/log    ext4    defaults,noatime             0  2

# ── Swap ───────────────────────────────────────────────────────────────────────
UUID="REPLACE-WITH-SWAP-UUID"    none        swap    sw                           0  0
# OR: /dev/mapper/vg_data-swap   none        swap    sw                           0  0

# ── NFS Mounts ─────────────────────────────────────────────────────────────────
# nofail: don't fail boot if NFS is unavailable
# _netdev: wait for network before mounting
# timeo=30: 30-second timeout before retrying
# bg: retry mount in background if fails on boot
10.0.1.20:/shared/assets    /mnt/assets   nfs4    defaults,nofail,_netdev,\
                                                   timeo=30,retrans=3,bg          0  0

# ── CIFS / SMB Network Share ───────────────────────────────────────────────────
# Credentials file: create /etc/cifs-credentials with username/password
//file-server/share          /mnt/share    cifs    credentials=/etc/cifs-credentials,\
                                                   uid=appuser,gid=appuser,\
                                                   file_mode=0640,dir_mode=0750,\
                                                   nofail,_netdev                 0  0

# ── tmpfs — RAM-based temporary filesystem ─────────────────────────────────────
# Great for build caches, tmp files — survives reboot wipes automatically
tmpfs                        /tmp          tmpfs   defaults,size=2G,mode=1777    0  0
tmpfs                        /tmp/build    tmpfs   defaults,size=4G,mode=1777    0  0

# ── Bind mount — map legacy path to new location ──────────────────────────────
# Useful for migrating paths without breaking existing applications
/opt/app/data                /data         none    bind                          0  0

# ── ISO / Loop mount (for read-only data) ──────────────────────────────────────
/path/to/data.iso            /mnt/data-iso iso9660 ro,loop                       0  0

# =============================================================================
# MOUNT OPTIONS REFERENCE:
#
#   defaults         rw,suid,dev,exec,auto,nouser,async
#   noatime          Don't update access time on read (performance)
#   nodiratime       Don't update dir access time (performance)
#   relatime         Update atime only if newer than mtime (compromise)
#   ro               Read-only
#   rw               Read-write (default)
#   noexec           Prevent binary execution (/tmp security)
#   nosuid           Ignore setuid/setgid bits (security)
#   nodev            Ignore device files (security)
#   nofail           Don't error if device missing (non-critical mounts)
#   _netdev          Wait for network (NFS/iSCSI/CIFS)
#   errors=remount-ro  Remount read-only on error (root filesystem)
#   barrier=0        Disable write barriers (SSD with BBWC controller)
#   commit=60        Flush data every 60s instead of 5s (reduce I/O)
#   discard          Enable TRIM for SSDs (also enable via fstrim.timer)
#   lazytime         Update timestamps in memory, flush only periodically
#
# TESTING:
#   sudo mount -fav        # Dry-run: show what would be mounted
#   sudo mount -a          # Mount everything not yet mounted
#   sudo findmnt --verify  # Verify fstab consistency
#
# IMMUTABLE SIGNATURE — DO NOT EDIT OR REMOVE
