# =============================================================================
# sudoers-production.conf
# Production sudoers policy — drop-in file for /etc/sudoers.d/
#
# INSTALLATION:
#   sudo cp sudoers-production.conf /etc/sudoers.d/production-policy
#   sudo chmod 440 /etc/sudoers.d/production-policy
#   sudo visudo -cf /etc/sudoers.d/production-policy   # validate syntax
#
# GOLDEN RULES:
#   1. Always edit with: sudo visudo -f /etc/sudoers.d/production-policy
#   2. Never use blanket: username ALL=(ALL) ALL
#   3. Prefer %groups over individual usernames
#   4. Use NOPASSWD sparingly — only for automated (CI/CD) accounts
#   5. Restrict commands to absolute paths only
#   6. Test every rule with: sudo -l -U <username>
#
# VERIFICATION:
#   sudo visudo -cf /etc/sudoers.d/production-policy
#
# Author : Eknatha 
# Repo   : linux-for-devops/06-user-management
# =============================================================================

# ---------------------------------------------------------------------------
# SECTION 1: Command Aliases
# Define reusable command groups — use these in rules below
# ---------------------------------------------------------------------------

# Service management (systemctl)
Cmnd_Alias SYSTEMCTL_CMDS = \
    /usr/bin/systemctl start *, \
    /usr/bin/systemctl stop *, \
    /usr/bin/systemctl restart *, \
    /usr/bin/systemctl reload *, \
    /usr/bin/systemctl status *, \
    /usr/bin/systemctl enable *, \
    /usr/bin/systemctl disable *, \
    /usr/bin/systemctl daemon-reload

# Log viewing (read-only)
Cmnd_Alias LOG_CMDS = \
    /usr/bin/journalctl *, \
    /bin/cat /var/log/*, \
    /usr/bin/tail /var/log/*, \
    /usr/bin/grep * /var/log/*

# Network diagnostics (read-only)
Cmnd_Alias NETWORK_DIAG_CMDS = \
    /usr/bin/ss -tulnp, \
    /bin/netstat -tulnp, \
    /usr/bin/dig *, \
    /bin/ping *, \
    /usr/sbin/traceroute *, \
    /usr/bin/nmap -sV *

# Package management (install/update only — no remove)
Cmnd_Alias PKG_INSTALL_CMDS = \
    /usr/bin/apt update, \
    /usr/bin/apt install *, \
    /usr/bin/apt upgrade *, \
    /usr/bin/yum install *, \
    /usr/bin/yum update *, \
    /usr/bin/dnf install *, \
    /usr/bin/dnf update *

# Docker — read-only operations
Cmnd_Alias DOCKER_READ_CMDS = \
    /usr/bin/docker ps *, \
    /usr/bin/docker images *, \
    /usr/bin/docker logs *, \
    /usr/bin/docker inspect *, \
    /usr/bin/docker stats *

# Docker — deployment operations
Cmnd_Alias DOCKER_DEPLOY_CMDS = \
    /usr/bin/docker pull *, \
    /usr/bin/docker run *, \
    /usr/bin/docker stop *, \
    /usr/bin/docker rm *, \
    /usr/bin/docker-compose up *, \
    /usr/bin/docker-compose down *, \
    /usr/bin/docker-compose pull *

# Database management
Cmnd_Alias DB_CMDS = \
    /usr/bin/systemctl restart postgresql, \
    /usr/bin/systemctl restart mysql, \
    /usr/bin/systemctl restart mariadb, \
    /usr/bin/pg_dump *, \
    /usr/bin/mysqldump *, \
    /usr/bin/psql *

# Nginx operations
Cmnd_Alias NGINX_CMDS = \
    /usr/sbin/nginx -t, \
    /usr/bin/systemctl start nginx, \
    /usr/bin/systemctl stop nginx, \
    /usr/bin/systemctl restart nginx, \
    /usr/bin/systemctl reload nginx, \
    /usr/bin/certbot *

# System monitoring (read-only)
Cmnd_Alias MONITOR_CMDS = \
    /usr/bin/df *, \
    /usr/bin/du *, \
    /usr/bin/free *, \
    /usr/bin/vmstat *, \
    /usr/bin/iostat *, \
    /usr/bin/top, \
    /usr/bin/htop, \
    /bin/ps aux, \
    /usr/bin/lsof *

# User management (for admins only)
Cmnd_Alias USER_MGMT_CMDS = \
    /usr/sbin/useradd *, \
    /usr/sbin/usermod *, \
    /usr/sbin/userdel *, \
    /usr/bin/passwd *, \
    /usr/sbin/groupadd *, \
    /usr/sbin/groupmod *, \
    /usr/sbin/groupdel *

# File operations in deployment dirs
Cmnd_Alias DEPLOY_FILE_CMDS = \
    /bin/cp /opt/* /opt/*, \
    /bin/mv /opt/* /opt/*, \
    /bin/rm /opt/releases/*, \
    /bin/mkdir -p /opt/*, \
    /bin/chown * /opt/*, \
    /bin/chmod * /opt/*

# ---------------------------------------------------------------------------
# SECTION 2: User/Group Aliases
# ---------------------------------------------------------------------------

User_Alias  OPS_TEAM    = %ops-engineers, %sre-team
User_Alias  DBA_TEAM    = %dbadmins
User_Alias  APP_DEPLOYERS = ci-deploy, github-runner, jenkins

# ---------------------------------------------------------------------------
# SECTION 3: Host Aliases (restrict rules to specific server roles)
# ---------------------------------------------------------------------------

Host_Alias  PROD_SERVERS  = prod-web-01, prod-web-02, prod-app-01, prod-app-02
Host_Alias  DB_SERVERS    = prod-db-01, prod-db-02, prod-db-replica
Host_Alias  ALL_SERVERS   = ALL

# ---------------------------------------------------------------------------
# SECTION 4: Privilege Rules
# Format: WHO  WHERE=(AS_WHOM)  [NOPASSWD:]  WHAT
# ---------------------------------------------------------------------------

# -- 4.1 Senior Ops / SRE Team --
# Can manage all services and read logs with password confirmation
OPS_TEAM    ALL_SERVERS=(ALL)  SYSTEMCTL_CMDS
OPS_TEAM    ALL_SERVERS=(ALL)  NOPASSWD: LOG_CMDS
OPS_TEAM    ALL_SERVERS=(ALL)  NOPASSWD: MONITOR_CMDS
OPS_TEAM    ALL_SERVERS=(ALL)  NOPASSWD: NETWORK_DIAG_CMDS

# -- 4.2 CI/CD Deploy Accounts --
# Automated accounts: NOPASSWD allowed (no human to type password)
# Restricted to specific deployment actions only
APP_DEPLOYERS  PROD_SERVERS=(ALL)  NOPASSWD: \
    /usr/bin/systemctl restart myapp, \
    /usr/bin/systemctl reload nginx, \
    /usr/bin/systemctl restart nginx, \
    DOCKER_DEPLOY_CMDS, \
    DEPLOY_FILE_CMDS

# -- 4.3 Database Administrators --
# DB operations on DB servers only
DBA_TEAM    DB_SERVERS=(ALL)   DB_CMDS
DBA_TEAM    DB_SERVERS=(ALL)   NOPASSWD: MONITOR_CMDS

# -- 4.4 Developers (Limited Access) --
# Read-only: logs and system status — no service restarts
%developers  PROD_SERVERS=(ALL)  NOPASSWD: LOG_CMDS
%developers  PROD_SERVERS=(ALL)  NOPASSWD: DOCKER_READ_CMDS
%developers  PROD_SERVERS=(ALL)  NOPASSWD: MONITOR_CMDS

# -- 4.5 Monitoring / Observability Account --
# Prometheus exporter, Nagios, Datadog agent — absolute minimum
monitoring  ALL=(ALL)  NOPASSWD: \
    /usr/bin/ss -tulnp, \
    /bin/cat /proc/net/dev, \
    /usr/bin/df -h, \
    /usr/bin/free -m, \
    LOG_CMDS

# -- 4.6 Nginx / Web Admins --
%webadmins  PROD_SERVERS=(ALL)  NOPASSWD: NGINX_CMDS
%webadmins  PROD_SERVERS=(ALL)  NOPASSWD: LOG_CMDS

# -- 4.7 Package Managers (patching team) --
%patch-team  ALL_SERVERS=(ALL)  PKG_INSTALL_CMDS

# -- 4.8 System Administrators --
# Full access with password — audit trail maintained
%sysadmins  ALL=(ALL)   ALL

# ---------------------------------------------------------------------------
# SECTION 5: Security Hardening Settings
# ---------------------------------------------------------------------------

# Require a TTY for sudo (prevents sudo from cron/scripts — good audit trail)
Defaults    requiretty

# Do NOT allow sudo with env vars that could be exploited
Defaults    env_reset
Defaults    env_keep += "LANG LC_ALL LC_MESSAGES DISPLAY"

# Extend sudo timestamp per-terminal, not per-user (safer)
Defaults    timestamp_type=tty

# Short sudo session timeout (10 min — reduce window if session is left open)
Defaults    timestamp_timeout=10

# Log all sudo commands with arguments
Defaults    log_input
Defaults    log_output
Defaults    logfile=/var/log/sudo.log

# Send sudo alerts via mail (set to your ops mailing list)
# Defaults    mailto=ops-alerts@company.com
# Defaults    mail_badpass

# Limit sudo lecture to once (not on every sudo invocation)
Defaults    lecture=once

# Show a warning message to all sudo users
Defaults    lecture_file=/etc/sudo-warning.txt

# ---------------------------------------------------------------------------
# SECTION 6: Explicit DENY rules (must come AFTER allows)
# ---------------------------------------------------------------------------

# Prevent privilege escalation via shells — even for sysadmins
Cmnd_Alias DANGEROUS_CMDS = \
    /bin/su, \
    /bin/bash, \
    /bin/sh, \
    /usr/bin/vi /etc/sudoers*, \
    /usr/bin/vim /etc/sudoers*, \
    /usr/bin/nano /etc/sudoers*, \
    /bin/chmod 777 *, \
    /usr/bin/python*, \
    /usr/bin/perl*, \
    /usr/bin/ruby*

# Restrict CI/CD accounts from dangerous commands
APP_DEPLOYERS  ALL=(ALL)  !DANGEROUS_CMDS

# ---------------------------------------------------------------------------
# VERIFICATION COMMANDS (run these to test):
#
#   sudo visudo -cf /etc/sudoers.d/production-policy
#   sudo -l -U ci-deploy
#   sudo -l -U john.doe
#   sudo -l -U monitoring
#
# VIEW SUDO LOGS:
#   sudo tail -f /var/log/sudo.log
#   sudo journalctl _COMM=sudo
#   sudo ausearch -k privilege-escalation (if auditd is enabled)
# ---------------------------------------------------------------------------

